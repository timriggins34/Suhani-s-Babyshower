<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suhani's Baby Shower</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f4f1eb;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cormorant Garamond', serif;
            overscroll-behavior: none; /* Prevents pull-to-refresh on mobile */
        }

        #card-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 90vh; /* Fallback height */
            min-height: 500px;
            max-height: 800px;
            aspect-ratio: 9 / 16;
            flex-shrink: 0; /* Prevent flexbox collapse */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: #fff;
        }

        #base-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Base_bg.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20%;
            box-sizing: border-box;
            color: #4a5c48; /* Dark olive green to match foliage */
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            line-height: 1.1;
            color: #3b4938;
        }

        .date, .time {
            font-size: 1.3rem;
            margin: 5px 0;
            font-weight: 600;
        }

        .venue {
            margin: 15px 0;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .rsvp {
            margin-top: 20px;
            font-size: 1.2rem;
            font-style: italic;
            font-weight: 600;
        }

        #scratch-pad {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
        }

        /* Adjustments for smaller screens */
        @media (max-width: 400px) {
            h1 { font-size: 1.8rem; }
            .date, .time { font-size: 1.1rem; }
            .venue { font-size: 1rem; }
            #base-layer { padding: 15%; }
        }
    </style>
</head>
<body>

    <div id="card-container">
        <div id="base-layer">
            <h1>Suhani's<br>Baby Shower</h1>
            <div class="date">April 12th, Sunday</div>
            <div class="time">12:00 pm</div>
            <div class="venue">The Swinton House<br>B, 20, Gopinath Marg,<br>Jayanti Market, New Colony</div>
            <div class="rsvp">RSVP to XYZ</div>
        </div>
        <canvas id="scratch-pad"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('scratch-pad');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('card-container');

        let isDrawing = false;
        let brushSize = 40;
        let scratchCount = 0;
        let corsErrorDetected = false;

        const scratchImage = new Image();
        // Removed crossOrigin declaration to prevent image load failure 
        // in environments without explicit CORS headers.
        scratchImage.src = 'Scratch_bg.png';

        function resizeAndDrawCanvas() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
            
            // Re-draw image if loaded, adjusting scale to cover canvas
            if (scratchImage.complete && scratchImage.naturalHeight !== 0) {
                drawCoverImage();
            }
        }

        function drawCoverImage() {
            // Calculate aspect ratio to ensure image covers the canvas properly (object-fit: cover equivalent)
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = scratchImage.width / scratchImage.height;
            let drawWidth = canvas.width;
            let drawHeight = canvas.height;
            let offsetX = 0;
            let offsetY = 0;

            if (canvasRatio > imgRatio) {
                drawHeight = canvas.width / imgRatio;
                offsetY = (canvas.height - drawHeight) / 2;
            } else {
                drawWidth = canvas.height * imgRatio;
                offsetX = (canvas.width - drawWidth) / 2;
            }

            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(scratchImage, offsetX, offsetY, drawWidth, drawHeight);
        }

        scratchImage.onload = resizeAndDrawCanvas;
        window.addEventListener('resize', resizeAndDrawCanvas);

        function getCoordinates(event) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;

            if (event.type.includes('touch')) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }

            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(event) {
            isDrawing = true;
            scratch(event);
        }

        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            checkRevealStatus();
        }

        function scratch(event) {
            if (!isDrawing) return;
            event.preventDefault();

            const { x, y } = getCoordinates(event);

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, brushSize, 0, Math.PI * 2);
            ctx.fill();

            // Fallback tracking if pixel reading is blocked
            scratchCount++;
            if (corsErrorDetected && scratchCount > 100) {
                revealFullImage();
            }
        }

        function checkRevealStatus() {
            if (corsErrorDetected) return;

            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                let transparentPixels = 0;

                // Check alpha channel (every 4th value)
                for (let i = 3; i < pixels.length; i += 4) {
                    if (pixels[i] === 0) {
                        transparentPixels++;
                    }
                }

                const totalPixels = pixels.length / 4;
                const percentTransparent = (transparentPixels / totalPixels) * 100;

                // Auto-reveal when 45% of the card is scratched
                if (percentTransparent > 45) {
                    revealFullImage();
                }
            } catch (e) {
                // Occurs if running locally without a web server (file:// protocol) due to CORS
                corsErrorDetected = true;
            }
        }

        function revealFullImage() {
            canvas.style.transition = 'opacity 0.6s ease-out';
            canvas.style.opacity = '0';
            setTimeout(() => {
                canvas.style.pointerEvents = 'none';
            }, 600);
        }

        // Mouse Events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        // Touch Events
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', scratch, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

    </script>
</body>
</html>
